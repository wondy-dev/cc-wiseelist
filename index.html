<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>cc · wiseelist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#cc785c; --primary-active:#a9583e;
    --ink:#141413; --body:#3d3d3a; --body-strong:#252523;
    --muted:#6c6a64; --muted-soft:#8e8b82;
    --hairline:#e6dfd8; --hairline-soft:#ebe6df;
    --canvas:#faf9f5; --surface-soft:#f5f0e8; --surface-card:#efe9de;
    --surface-dark:#181715; --surface-dark-soft:#1f1e1b; --surface-dark-el:#252320;
    --on-dark:#faf9f5; --on-dark-soft:#a09d96;
    --success:#5db872; --error:#c64545;
    --serif:"Cormorant Garamond",Garamond,"Times New Roman",serif;
    --hand:"Onglyph Wiseelist","Cormorant Garamond",Garamond,serif;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  @font-face{
    font-family:"Onglyph Wiseelist";
    src:url("wiseelist.woff2") format("woff2");
    font-weight:400;font-style:normal;font-display:swap;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--canvas);color:var(--body);font-family:var(--sans);
    font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .spike{color:var(--primary);font-style:normal}

  /* ---------- Login gate ---------- */
  #gate{position:fixed;inset:0;background:var(--canvas);display:flex;
    align-items:center;justify-content:center;padding:24px;z-index:50}
  .gate-card{width:100%;max-width:380px;text-align:center}
  .gate-mark{font-size:13px;letter-spacing:1.5px;font-weight:500;color:var(--muted);
    text-transform:uppercase;margin-bottom:20px}
  .gate-card h1{font-family:var(--hand);font-weight:400;font-size:clamp(32px,8.5vw,44px);
    line-height:1.2;letter-spacing:0;color:var(--ink);margin-bottom:12px}
  .gate-card p{color:var(--muted);font-size:15px;margin-bottom:28px}
  .gate-form{display:flex;flex-direction:column;gap:12px}
  #pw{height:46px;border:1px solid var(--hairline);border-radius:8px;
    background:#fff;padding:0 16px;font-family:var(--sans);font-size:16px;
    color:var(--ink);text-align:center;outline:none;transition:border .15s,box-shadow .15s}
  #pw:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(204,120,92,.15)}
  .gate-btn{height:46px;border:none;border-radius:8px;background:var(--primary);
    color:#fff;font-family:var(--sans);font-weight:500;font-size:15px;cursor:pointer;
    transition:background .15s}
  .gate-btn:hover{background:var(--primary-active)}
  .gate-btn:disabled{opacity:.6;cursor:default}
  .gate-err{color:var(--error);font-size:14px;min-height:20px;margin-top:4px}
  .gate-foot{margin-top:26px;font-size:12px;color:var(--muted-soft);letter-spacing:.3px}

  /* ---------- App ---------- */
  #app{display:none}
  .topnav{position:sticky;top:0;z-index:20;height:60px;background:rgba(250,249,245,.85);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--hairline-soft);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 24px;gap:16px}
  .brand{font-family:var(--sans);font-weight:600;font-size:16px;color:var(--ink);
    text-decoration:none;white-space:nowrap}
  .brand em{font-style:normal;color:var(--primary)}
  .navlinks{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .navlinks a{font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;
    padding:6px 10px;border-radius:6px;transition:background .15s,color .15s}
  .navlinks a:hover{background:var(--surface-card);color:var(--ink)}

  .hero{text-align:center;padding:88px 24px 64px;border-bottom:1px solid var(--hairline-soft)}
  .badge-coral{display:inline-block;background:var(--primary);color:#fff;
    font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
    padding:5px 14px;border-radius:9999px;margin-bottom:24px}
  .hero h1{font-family:var(--hand);font-weight:400;font-size:clamp(36px,9.5vw,64px);line-height:1.12;
    letter-spacing:-.5px;color:var(--ink);margin-bottom:22px}
  .hero-sub{font-size:clamp(16px,4.5vw,20px);color:var(--body-strong);max-width:620px;margin:0 auto 14px}
  .hero-sub strong{color:var(--primary);font-weight:600}
  .hero-meta{font-size:14px;color:var(--muted-soft)}

  .wrap{max-width:780px;margin:0 auto;padding:0 24px}
  .chap{padding:64px 0;border-bottom:1px solid var(--hairline-soft)}
  .chap:last-of-type{border-bottom:none}
  .chap-num{font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--primary);margin-bottom:14px}
  .chap h2{font-family:var(--hand);font-weight:400;font-size:clamp(28px,7vw,40px);line-height:1.2;
    letter-spacing:0;color:var(--ink);margin-bottom:20px}
  .chap h3{font-family:var(--sans);font-weight:600;font-size:19px;color:var(--ink);
    margin:34px 0 12px}
  .chap p{margin-bottom:16px;color:var(--body)}
  .chap .lead{font-size:18px;color:var(--body-strong);line-height:1.6}
  .chap strong{color:var(--body-strong);font-weight:600}
  .chap em{font-style:normal;color:var(--primary);font-weight:500}
  .chap .warm{font-family:var(--hand);color:var(--primary);font-weight:400;font-size:21px;line-height:1.45}
  .chap ul,.chap ol{margin:0 0 16px;padding-left:22px}
  .chap li{margin-bottom:8px}
  code{font-family:var(--mono);font-size:13.5px;background:var(--surface-card);
    color:var(--body-strong);padding:2px 6px;border-radius:5px}

  table{width:100%;border-collapse:collapse;margin:18px 0;font-size:15px}
  th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--hairline)}
  th{background:var(--surface-soft);color:var(--ink);font-weight:600;font-size:13px;
    letter-spacing:.3px}
  td code{background:transparent;padding:0}

  .code{background:var(--surface-dark);border-radius:12px;margin:18px 0;overflow:hidden}
  .code .bar{display:flex;gap:7px;padding:13px 16px;background:var(--surface-dark-el)}
  .code .bar span{width:11px;height:11px;border-radius:50%;background:#3a3833}
  .code pre{font-family:var(--mono);font-size:13px;line-height:1.65;color:var(--on-dark);
    padding:18px 20px;overflow-x:auto;white-space:pre;tab-size:2}
  .code pre b{color:#e8a55a;font-weight:400}
  .code .cmt,.code pre .cmt{color:var(--on-dark-soft)}
  .code .good{color:#7fd49a}
  .code .bad{color:#e08b7d}

  .callout{background:var(--primary);color:#fff;border-radius:12px;padding:24px 28px;margin:24px 0}
  .callout strong{display:block;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;
    color:#fff;opacity:.85;margin-bottom:8px;font-weight:600}
  .callout p{margin:0;color:#fff;font-size:16px}
  .callout.dark{background:var(--surface-dark)}
  .callout.dark p{font-family:var(--hand);font-size:25px;line-height:1.5;color:var(--on-dark)}

  .tip{background:var(--surface-soft);border-left:3px solid var(--primary);
    border-radius:0 8px 8px 0;padding:14px 18px;margin:20px 0;font-size:15px;color:var(--body)}
  .tip .spike{margin-right:6px}

  .kbd{display:inline-block;font-family:var(--sans);font-size:12px;font-weight:600;
    background:#fff;border:1px solid var(--hairline);border-bottom-width:2px;
    border-radius:5px;padding:2px 7px;color:var(--ink);line-height:1}

  .foot{background:var(--surface-dark);color:var(--on-dark-soft);padding:48px 24px;text-align:center}
  .foot p:first-child{color:var(--on-dark);font-weight:600;margin-bottom:10px}
  .foot .foot-meta{font-size:12.5px;line-height:1.6;max-width:680px;margin:0 auto}

  @media(max-width:640px){
    .navlinks{display:none}
    .topnav{padding:0 16px}
    .hero{padding:60px 18px 44px}
    .wrap{padding:0 18px}
    .chap{padding:44px 0}
    .chap h3{font-size:18px}
    .chap .lead{font-size:17px}
    .code pre{font-size:12px;padding:14px 16px}
    .callout{padding:20px 22px}
    .callout.dark p{font-size:19px}
    .tip{padding:13px 16px}
    table{font-size:13px}
    th,td{padding:9px 10px}
  }
</style>
</head>
<body>

  </div>

  function b64ToBuf(b64){
    const bin = atob(b64); const u = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i);
    return u;
  }
  async function deriveKey(pw, salt){
    const base = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      {name:'PBKDF2', salt, iterations:150000, hash:'SHA-256'},
      base, {name:'AES-GCM', length:256}, false, ['decrypt']);
  }
  async function unlock(pw){
    const salt = b64ToBuf(PAYLOAD.salt);
    const iv   = b64ToBuf(PAYLOAD.iv);
    const ct   = b64ToBuf(PAYLOAD.ct);
    const key  = await deriveKey(pw, salt);
    const pt   = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
    return new TextDecoder().decode(pt);
  }

  const form = document.getElementById('gateForm');
  const pwEl = document.getElementById('pw');
  const errEl= document.getElementById('gateErr');
  const btn  = document.getElementById('gateBtn');

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    errEl.textContent = '';
    btn.disabled = true; btn.textContent = '여는 중...';
    try{
      const html = await unlock(pwEl.value);
      document.getElementById('app').innerHTML = html;
      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      window.scrollTo(0,0);
    }catch(err){
      errEl.textContent = '비밀번호가 맞지 않습니다.';
      btn.disabled = false; btn.textContent = '열기';
      pwEl.value=''; pwEl.focus();
    }
  });
</script>
